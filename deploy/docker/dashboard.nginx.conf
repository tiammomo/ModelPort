server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 32m;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; script-src 'self'; style-src 'self' 'unsafe-inline'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'" always;

  location /admin/ {
    proxy_pass http://modelport:38082/admin/;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /v1/ {
    proxy_pass http://modelport:38082/v1/;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_read_timeout 600s;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /livez {
    proxy_pass http://modelport:38082/livez;
  }

  location = /readyz {
    proxy_pass http://modelport:38082/readyz;
  }

  location = /health {
    proxy_pass http://modelport:38082/health;
  }

  location = /metrics {
    proxy_pass http://modelport:38082/metrics;
  }

  # Hashed build assets are immutable. A missing asset must stay a 404 instead
  # of falling through to index.html, otherwise browsers parse HTML as a JS
  # module after a rolling frontend deployment.
  location /assets/ {
    try_files $uri =404;
    expires 1y;
  }

  # Always revalidate the SPA entry document so a reload picks up the asset
  # manifest from the current container version.
  location = /index.html {
    expires -1;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
