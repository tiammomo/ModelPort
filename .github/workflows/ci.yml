name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Repository checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CARGO_TERM_COLOR: always
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Activate pinned Rust toolchain
        run: |
          rustup show active-toolchain
          cargo --version

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ runner.arch }}-

      - name: Run all checks
        run: ./scripts/check-all.sh

      - name: Audit locked dependencies
        run: |
          if [[ ! -x target/cargo-audit/bin/cargo-audit ]]; then
            cargo install cargo-audit --locked --version 0.22.2 --root target/cargo-audit
          fi
          target/cargo-audit/bin/cargo-audit audit --deny warnings --file Cargo.lock
          npm --prefix dashboard audit --audit-level=low

      - name: Validate Docker Compose manifest
        env:
          MODELPORT_COMPOSE_ENV_FILE: deploy/docker/modelport.env.example
        run: docker compose --env-file deploy/docker/modelport.env.example config --quiet
