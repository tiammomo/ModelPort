name: Feature request
description: Suggest a provider, protocol, deployment, or developer-experience improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        请不要粘贴真实 API key、token、完整 `.env`、完整备份、prompt/response 或敏感日志。
  - type: textarea
    id: problem
    attributes:
      label: 背景和目标
      description: 这个需求解决什么使用问题？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 可以包含 API、配置、provider、文档或脚本设计。
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 影响范围
      options:
        - provider compatibility
        - routing
        - streaming
        - auth/security
        - deployment
        - docs
        - tooling
        - other
  - type: textarea
    id: validation
    attributes:
      label: 验证方式
      description: 说明你期望如何测试或验收这个能力。
