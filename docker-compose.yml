name: modelport

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${MODELPORT_POSTGRES_DB:-modelport}
      POSTGRES_USER: ${MODELPORT_POSTGRES_USER:-modelport}
      POSTGRES_PASSWORD: ${MODELPORT_POSTGRES_PASSWORD:?set MODELPORT_POSTGRES_PASSWORD in .env}
    volumes:
      - modelport-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  modelport:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODELPORT_SOURCE_REVISION: ${MODELPORT_SOURCE_REVISION:-unknown}
        MODELPORT_SOURCE_STATE: ${MODELPORT_SOURCE_STATE:-unknown}
    image: modelport:local
    init: true
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    env_file:
      - ${MODELPORT_COMPOSE_ENV_FILE:-.env}
    environment:
      MODELPORT_BIND: 0.0.0.0:38082
      MODELPORT_ENV_FILE: /config/.env
      MODELPORT_STATE_DIR: /data
      MODELPORT_CONTROL_STORE: /data/control-plane.json
      MODELPORT_CONFIG: /config/config.toml
      MODELPORT_DATABASE_URL: ${MODELPORT_DATABASE_URL:-postgres://${MODELPORT_POSTGRES_USER:-modelport}:${MODELPORT_POSTGRES_PASSWORD:?set MODELPORT_POSTGRES_PASSWORD in .env}@postgres:5432/${MODELPORT_POSTGRES_DB:-modelport}}
      MODELPORT_TRUSTED_PROXIES: ${MODELPORT_TRUSTED_PROXIES:-127.0.0.1,::1,172.16.0.0/12}
      MODELPORT_ALLOWED_ORIGINS: ${MODELPORT_ALLOWED_ORIGINS:-}
      RUST_LOG: ${RUST_LOG:-model_port=info,tower_http=info}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${MODELPORT_API_PUBLISH:-127.0.0.1:38082}:38082"
    volumes:
      - modelport-data:/data
      - type: bind
        source: ${MODELPORT_COMPOSE_ENV_FILE:-./.env}
        target: /config/.env
        read_only: true
      # Optional file-based provider config:
      - ./config.toml:/config/config.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    image: modelport-dashboard:local
    init: true
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
    depends_on:
      modelport:
        condition: service_healthy
    ports:
      - "${MODELPORT_DASHBOARD_PUBLISH:-127.0.0.1:33002}:8080"
    restart: unless-stopped

volumes:
  modelport-data:
  modelport-postgres:

networks:
  default:
    name: ${MODELPORT_NETWORK_NAME:-modelport_default}
